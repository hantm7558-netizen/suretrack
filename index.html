<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SureTrack v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #00ff41; --secondary: #58a6ff; --text: #c9d1d9; --accent: #f0883e; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--primary); font-size: 1.1rem; }
        .live-dot { height: 8px; width: 8px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 탭 전환 로직 */
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 스캐너 스타일 업데이트 */
        .bet-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; transition: 0.2s; position: relative; }
        
        /* 카드 상단 헤더 영역 (수익률 + 아이콘) */
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .match-meta { font-size: 0.75rem; color: #8b949e; font-family: 'JetBrains Mono', monospace; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .profit-tag { color: var(--primary); font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1rem; }
        
        /* [요구사항] 계산기 아이콘 스타일 */
        .calc-trigger-icon { color: var(--accent); font-size: 1.1rem; cursor: pointer; opacity: 0.7; transition: 0.2s; padding: 5px; border-radius: 5px; }
        .calc-trigger-icon:hover { opacity: 1; background: rgba(240, 136, 62, 0.1); transform: scale(1.1); }

        .match-title { font-weight: 700; color: white; display: block; margin-bottom: 15px; font-size: 1rem; clear: both; }
        .odds-row { display: flex; gap: 8px; }
        .odd-item { flex: 1; background: #0d1117; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #21262d; }
        .o-val { color: var(--secondary); font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        /* 계산기 스타일 그대로 유지 */
        .calc-container { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 8px; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .result-box { background: rgba(0, 255, 65, 0.05); border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 12px; padding: 15px; margin-top: 20px; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .res-val { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--primary); }

        /* 하단 네비게이션 그대로 유지 */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-link { text-align: center; color: #8b949e; text-decoration: none; font-size: 0.65rem; cursor: pointer; transition: 0.2s; }
        .nav-link i { display: block; font-size: 1.3rem; margin-bottom: 5px; }
        .nav-link.active { color: var(--primary); }

        .v-footer { text-align: center; font-size: 0.65rem; color: #484f58; padding: 20px 0; font-family: 'JetBrains Mono', monospace; }
        .loading { text-align: center; padding: 50px; color: #8b949e; }
    </style>
</head>
<body>

<header>
    <div class="logo">SureTrack v8.0</div>
    <div id="status-text" style="font-size: 0.75rem; color: #8b949e;"><span class="live-dot"></span>SCANNING</div>
</header>

<div id="tab-scanner" class="tab-content active-tab">
    <div id="scanner-list">
        <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> 데이터 동기화 중...</div>
    </div>
</div>

<div id="tab-calc" class="tab-content">
    <div class="calc-container">
        <h3 style="margin-top:0; color:var(--primary);"><i class="fa-solid fa-calculator"></i> Arbitrage Calc</h3>
        <div class="input-group">
            <label>배당률 A (Bookie 1)</label>
            <input type="number" id="odd1" step="0.01" placeholder="0.00" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>배당률 B (Bookie 2)</label>
            <input type="number" id="odd2" step="0.01" placeholder="0.00" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>총 투자 금액 (Seed Money)</label>
            <input type="number" id="total-invest" value="1000000" oninput="calculate()">
        </div>

        <div class="result-box">
            <div class="res-row"><span>Bookie A 배팅액:</span> <span id="res-bet1" class="res-val">0</span></div>
            <div class="res-row"><span>Bookie B 배팅액:</span> <span id="res-bet2" class="res-val">0</span></div>
            <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">
            <div class="res-row" style="font-size:1.1rem;"><span>확정 수익:</span> <span id="res-profit" class="res-val" style="color:var(--primary);">0</span></div>
            <div class="res-row"><span>수익률:</span> <span id="res-percent" class="res-val">0%</span></div>
        </div>
    </div>
</div>

<div class="v-footer">
    v8.0 SureTrack Golden Master | AI Arbitrage Intelligence System
</div>

<nav>
    <div class="nav-link active" onclick="switchTab('scanner')"><i class="fa-solid fa-bolt"></i>SCANNER</div>
    <div class="nav-link" onclick="switchTab('calc')"><i class="fa-solid fa-calculator"></i>CALC</div>
    <div class="nav-link"><i class="fa-solid fa-layer-group"></i>HISTORY</div>
    <div class="nav-link"><i class="fa-solid fa-chart-pie"></i>STATS</div>
</nav>

<script>
    // 하쿠님의 최신 GAS URL 적용
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx6yjWtdnE06qGtnW95xAtQnSyCgjYIBGBzm6n9e945tUeYPeULg71Tp_5CEImbYBAO/exec';

    // 탭 전환 함수
    function switchTab(tabName, event) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        
        document.getElementById('tab-' + tabName).classList.add('active-tab');
        
        // 메뉴 클릭 시에만 active 스타일 적용
        if(event && event.currentTarget) {
            event.currentTarget.classList.add('active');
        } else {
            // 아이콘 클릭으로 이동 시 하단 메뉴 style 맞춤
            document.querySelector(`nav .nav-link:nth-child(2)`).classList.add('active');
            document.querySelector(`nav .nav-link:nth-child(1)`).classList.remove('active');
        }
        
        if(tabName === 'scanner') fetchData();
    }

    // 데이터 가져오기
    async function fetchData() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            renderScanner(data);
        } catch (e) {
            document.getElementById('scanner-list').innerHTML = `<div class="loading">연결 실패: GAS 설정을 확인하세요.</div>`;
        }
    }

    // 스캐너 리스트 출력 업데이트
    function renderScanner(items) {
        const list = document.getElementById('scanner-list');
        list.innerHTML = '';

        if (!items || items.length === 0) {
            list.innerHTML = `<div class="loading">현재 발견된 슈어벳 기회가 없습니다.</div>`;
            return;
        }

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'bet-card';
            
            // UX: 아이콘 클릭을 명확히 유도하기 위해 카드 전체 클릭은 제거하거나, 아이콘 클릭과 동일하게 유지 가능.
            // 일단 카드 전체 클릭도 유지하여 편리성을 높임.
            card.onclick = (e) => {
                // 아이콘 자체를 클릭했을 때만 작동하도록 하려면 아래 주석 해제
                // if (!e.target.classList.contains('calc-trigger-icon')) return;
                openCalc(item['배당A'], item['배당B']);
            };

            card.innerHTML = `
                <div class="card-header">
                    <span class="match-meta">${item['종목']}</span>
                    <div class="header-right">
                        <span class="profit-tag">+${item['수익률(%)']}%</span>
                        <i class="fa-solid fa-calculator calc-trigger-icon" title="계산기로 열기"></i>
                    </div>
                </div>
                <span class="match-title">${item['경기명']}</span>
                <div class="odds-row">
                    <div class="odd-item"><span class="o-val">${item['배당A']}</span></div>
                    <div class="odd-item"><span class="o-val">${item['배당B']}</span></div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    // 계산기로 이동 및 자동 세팅
    function openCalc(o1, o2) {
        document.getElementById('odd1').value = o1;
        document.getElementById('odd2').value = o2;
        switchTab('calc'); // 'calc' 탭으로 스위칭 (event 인자 없이 호출)
        calculate();
    }

    // 계산 로직 그대로 유지
    function calculate() {
        const o1 = parseFloat(document.getElementById('odd1').value);
        const o2 = parseFloat(document.getElementById('odd2').value);
        const total = parseFloat(document.getElementById('total-invest').value);

        if (!o1 || !o2 || !total) return;

        const arbPercent = (1/o1) + (1/o2);
        const bet1 = (total * (1/o1)) / arbPercent;
        const bet2 = total - bet1;
        const profit = (total / arbPercent) - total;
        const profitRate = (1/arbPercent - 1) * 100;

        document.getElementById('res-bet1').innerText = Math.floor(bet1).toLocaleString() + "원";
        document.getElementById('res-bet2').innerText = Math.floor(bet2).toLocaleString() + "원";
        document.getElementById('res-profit').innerText = "+" + Math.floor(profit).toLocaleString() + "원";
        document.getElementById('res-percent').innerText = profitRate.toFixed(2) + "%";
    }

    // 초기 실행
    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
